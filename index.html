    const rows = [["日付", "チャネル", "顧客", "品種", "数量kg", "金額"]];
    [...data.sales].sort((a, b) => a.date.localeCompare(b.date)).forEach((s) => rows.push([s.date, ch(s.channel).label, s.customerId ? byId[s.customerId] || s.label : s.label, s.variety || "", s.kg || 0, s.amount]));
    return toCsv(rows);
}
function worksToCsv(data) {
    const rows = [["日付", "作業", "圃場", "作業時間h", "収量kg", "使用薬剤", "メモ"]];
    [...data.works].sort((a, b) => a.date.localeCompare(b.date)).forEach((w) => rows.push([w.date, wk(w.type).label, w.block, w.hours || 0, w.kg || 0, w.agent || "", w.note || ""]));
    return toCsv(rows);
}
function resvToCsv(data) {
    const byId = Object.fromEntries(data.customers.map((c) => [c.id, c.name]));
    const rows = [["お届け希望日", "顧客", "チャネル", "品種", "数量kg", "金額", "入金", "メモ"]];
    [...data.reservations].sort((a, b) => (a.deliveryDate || "").localeCompare(b.deliveryDate || "")).forEach((r) => rows.push([r.deliveryDate || "", r.customerId ? byId[r.customerId] || r.label : r.label, ch(r.channel).label, r.variety || "", r.kg || 0, r.amount, r.paid ? "済" : "未", r.note || ""]));
    return toCsv(rows);
}

        React.createElement("div", { className: "pf-card", style: { padding: 14 } },

                React.createElement(Download, { size: 15, style: { verticalAlign: "-2px", marginRight: 6 } }),
